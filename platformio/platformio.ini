; RP2350-Touch-LCD-4.3B PlatformIO Configuration
;
; Build:  pio run
; Upload: pio run -t upload
; Monitor: pio device monitor

[platformio]
default_envs = rp2350

; --- RP2350B Target Environment ---
[env:rp2350]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0

; RP2350B has 48 GPIOs (vs 30 on RP2350A)
; PICO_RP2350A=0 tells the SDK this is the B variant
build_flags =
    -DARDUINO_ARCH_RP2040
    -Os
    -DPICO_RP2350A=0

; Deep dependency resolution needed for cross-library includes
lib_ldf_mode = deep+

monitor_speed = 115200
